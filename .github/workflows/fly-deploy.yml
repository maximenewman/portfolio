# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.ts'
      - 'tsconfig.json'
      - 'Dockerfile'
      - 'fly.toml.example'
      - '.github/workflows/fly-deploy.yml'
  workflow_dispatch:
  repository_dispatch:
    types: [game-updated]

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group    # optional: ensure only one action runs at a time
    steps:
      - name: Checkout portfolio
        uses: actions/checkout@v4

      - name: Checkout GoblinsKeep (browser build branch)
        uses: actions/checkout@v4
        with:
          repository: maximenewman/GoblinsKeep
          ref: game/browser
          path: GoblinsKeep
          token: ${{ secrets.GAME_REPO_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build game
        working-directory: GoblinsKeep/web
        # Build with base=/goblinskeep/ so emitted asset URLs resolve under
        # the portfolio's /goblinskeep/ subpath instead of the site root.
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm exec vite build --base=/goblinskeep/

      - name: Copy game into portfolio public folder
        run: |
          mkdir -p public/goblinskeep
          cp -R GoblinsKeep/web/dist/. public/goblinskeep/

      - name: Remove GoblinsKeep checkout (avoid sending to Fly build context)
        run: rm -rf GoblinsKeep

      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run:  |
          cp fly.toml.example fly.toml
          sed -i "s/YOUR_APP_NAME/${{ secrets.FLY_APP_NAME }}/" fly.toml
          sed -i "s/YOUR_APP_REGION/${{ secrets.FLY_APP_REGION }}/" fly.toml
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
